<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240">
  <defs>
    <linearGradient id="certBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f2ef"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="240" fill="url(#certBg)" rx="8"/>
  <!-- Border decoration -->
  <rect x="10" y="10" width="300" height="220" fill="none" stroke="#0a66c2" stroke-width="2" stroke-dasharray="6,4" rx="6" opacity="0.4"/>
  <!-- Certificate icon -->
  <rect x="130" y="60" width="60" height="48" rx="4" fill="#0a66c2" opacity="0.15"/>
  <text x="160" y="93" font-family="sans-serif" font-size="28" fill="#0a66c2" text-anchor="middle" opacity="0.6">🏆</text>
  <!-- Lines representing text -->
  <rect x="70" y="126" width="180" height="8" rx="4" fill="#0a66c2" opacity="0.2"/>
  <rect x="90" y="142" width="140" height="6" rx="3" fill="#888" opacity="0.25"/>
  <rect x="110" y="156" width="100" height="6" rx="3" fill="#888" opacity="0.2"/>
  <!-- Ribbon -->
  <circle cx="160" cy="190" r="14" fill="#0a66c2" opacity="0.15"/>
  <text x="160" y="195" font-family="sans-serif" font-size="10" fill="#0a66c2" text-anchor="middle" font-weight="bold" opacity="0.7">CERT</text>
  <!-- Placeholder label -->
  <text x="160" y="228" font-family="sans-serif" font-size="10" fill="#999" text-anchor="middle">Add certification image</text>
</svg>
