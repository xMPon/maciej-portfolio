<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0a66c2; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #004182 0%, #0a66c2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 2rem;
        }
        .error-wrap { max-width: 520px; }
        .error-code {
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }
        .error-icon { font-size: 3rem; margin: 1rem 0; opacity: 0.6; }
        .error-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
        .error-sub { color: rgba(255,255,255,0.7); margin-bottom: 2rem; font-size: 1rem; }
        .btn-home {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            color: #fff;
            border-radius: 25px;
            padding: 0.65rem 1.75rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.7);
            color: #fff;
            transform: translateY(-2px);
        }
        .error-footer { margin-top: 3rem; font-size: 0.8rem; color: rgba(255,255,255,0.35); }
    </style>
</head>
<body>
    <div class="error-wrap">
        <p class="error-code">404</p>
        <div class="error-icon"><i class="fas fa-map-signs"></i></div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-sub">
            Oops! The page you're looking for doesn't exist or has been moved.
            Let's get you back on track.
        </p>
        <a href="index.html" class="btn-home">
            <i class="fas fa-home"></i> Back to Home
        </a>
        <div class="error-footer">
            <p>Macie's CV &amp; Portfolio · Hosted on AWS S3</p>
        </div>
    </div>
</body>
</html>
